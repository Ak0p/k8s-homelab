---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-certificate
  namespace: traefik
spec:
  secretName: wildcard-certificate-secret
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - "*.${domain}"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: storage-certificate
  namespace: traefik
spec:
  secretName: storage-certificate-secret
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - "*.sftpgo.${domain}"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rustfs-storage-certificate
  namespace: traefik
spec:
  secretName: rustfs-storage-certificate-secret
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - "*.rustfs.${domain}"
