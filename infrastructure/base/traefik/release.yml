---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      version: " >= 39.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
  values:
    providers:
      kubernetesGateway:
        enabled: true
    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`traefik.akop.ro`)
        entryPoints:
          - web
