---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      version: " >= 39.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
  values:
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
      kubernetesGateway:
        enabled: true
    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`traefik.${domain}`)
        entryPoints:
          - web
    service:
      single: true
      annotations:
        metallb.io/loadBalancerIPs: 192.168.1.196
        external-dns.alpha.kubernetes.io/hostname: traefik.${domain}
