---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      version: " >= 39.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
  values:
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
      kubernetesGateway:
        enabled: true
    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`traefik.akop.ro`)
        entryPoints:
          - web
    ports:
      sftp:
        port: 2022
        protocol: TCP
        expose:
          default: true
      ftp:
        port: 2121
        protocol: TCP
        expose:
          default: false
