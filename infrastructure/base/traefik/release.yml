---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      version: chart-version
      sourceRef:
        kind: HelmRepository
        name: traefik
  values:
    providers:
      kubernetesGateway:
        enabled: true