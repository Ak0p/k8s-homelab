---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rustfs-storage-route
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`s3.rustfs.akop.ro`)
      services:
        - name: rustfs-svc
          namespace: rustfs
          port: 9000
  tls:
    secretName: rustfs-storage-certificate-secret
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rustfs-dash-route
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dash.rustfs.akop.ro`)
      services:
        - name: rustfs-svc
          namespace: rustfs
          port: 9001
  tls:
    secretName: rustfs-storage-certificate-secret
