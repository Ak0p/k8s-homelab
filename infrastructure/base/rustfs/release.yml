---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rustfs
  namespace: rustfs
spec:
  interval: 5m
  chart:
    spec:
      chart: rustfs
      version: 0.0.90
      sourceRef:
        kind: HelmRepository
        name: rustfs
        namespace: rustfs
  values:
    mode:
      standalone:
        enabled: true
      distributed:
        enabled: false
    storageclass:
      name: host-zfs-files
      dataStorageSize: 2Ti
      logStorageSize: 2Gi
    ingress:
      enabled: false
