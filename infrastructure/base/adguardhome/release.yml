---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adguardhome
  namespace: adguardhome
spec:
  interval: 5m
  chart:
    spec:
      chart: adguard-home
      version: 13.0.0
      sourceRef:
        kind: HelmRepository
        name: adguardhome
        namespace: adguardhome
  values:
    persistence:
      data:
        type: pvc
        accessModes: ReadWriteMany
        size: 4Gi
        storageClass: host-zfs-standard
      config:
        enabled: true
        type: configmap
        objectName: adguardhome-config
        mountPath: /opt/adguardhome/conf/AdGuardHome.yaml
        subPath: AdGuardHome.yaml
        readOnly: false
