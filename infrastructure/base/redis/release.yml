---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: redis
spec:
  interval: 5m
  chart:
    spec:
      chart: redis
      version: ">= 24.1.3"
      sourceRef:
        kind: HelmRepository
        name: redis
  values:
    global:
      defaultStorageClass: host-zfs-standard
    master:
      persistence:
        storageClass: host-zfs-standard
    replica:
      count: 1
      persistence:
        storageClass: host-zfs-standard