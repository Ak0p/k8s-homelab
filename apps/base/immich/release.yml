---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  chart:
    spec:
      chart: immich
      version: ">= 0.10.3"
      sourceRef:
        kind: HelmRepository
        name: immich
  interval: 5m
  values:
    immich:
      persistence:
        library:
          existingClaim: immich
    controllers:
      main:
        containers:
          main:
            image:
              tag: v2.5.2
    valkey:
      enabled: true
