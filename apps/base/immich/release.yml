---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  chart:
    spec:
      chart: immich
      version: ">= 0.10.3"
      sourceRef:
        kind: HelmRepository
        name: immich
  interval: 5m
  values:
    immich:
      persistence:
        library:
          existingClaim: immich
    controllers:
      main:
        containers:
          main:
            image:
              tag: v2.5.2
            env:
              # DB_URL:
              #   valueFrom:
              #     secretKeyRef:
              #       name: immich-cluster-app
              #       key: fqdn-uri
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-cluster-app
                    key: host
              DB_PORT: 5432
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-cluster-superuser
                    key: user
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-cluster-superuser
                    key: password
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-cluster-app
                    key: dbname
    valkey:
      enabled: true
