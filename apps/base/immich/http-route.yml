apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich-route
  namespace: immich
spec:
  parentRefs:
    - namespace: traefik
      name: traefik-gateway
  hostnames:
    - immich.akop.ro

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
    - backendRefs:
        - name: immich-server
          port: 2283
