---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  interval: 5m
  chart:
    spec:
      chart: homepage
      version: 12.1.4
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: truecharts
  values:
    forceConfigFromValues: true
