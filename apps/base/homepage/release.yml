---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  interval: 5m
  chart:
    spec:
      chart: homepage
      version: 12.1.4
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: truecharts
  values:
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                HOMEPAGE_ALLOWED_HOSTS: home.akop.ro,localhost
    forceConfigFromValues: true
    persistence:
      config:
        enabled: true
        type: pvc
        retain: true
        accessModes: ReadWriteMany
        size: 10Gi
        storageClass: host-zfs-files
