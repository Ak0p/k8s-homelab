---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  interval: 5m
  chart:
    spec:
      chart: homepage
      version: 11.24.0
      sourceRef:
        kind: HelmRepository
        name: homepage
        namespace: homepage
  values:
    persistence:
      config:
        enabled: true
        type: pvc
        retain: true
        accessModes: ReadWriteMany
        size: 200Mi
        storageClass: host-zfs-files
    securityContext:
      pod:
        fsGroup: 0
      container:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        readOnlyRootFilesystem: false
