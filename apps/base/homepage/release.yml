---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  interval: 5m
  chart:
    spec:
      chart: homepage
      version: 11.24.0
      sourceRef:
        kind: HelmRepository
        name: homepage
        namespace: homepage
  values:
    persistence:
      config:
        type: pvc
        retain: true
        accessModes: ReadWriteMany
        size: 20Mi
        storageClass: host-zfs-files
