---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-assistant-route
  namespace: traefik
  annotations:
    external-dns.alpha.kubernetes.io/target: 192.168.1.196
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`ha.${domain}`)
      services:
        - kind: Service
          name: home-assistant-main
          namespace: home-assistant
          port: 8123
  tls:
    secretName: wildcard-certificate-secret
