---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  interval: 5m
  chart:
    spec:
      chart: home-assistant
      version: 30.0.4
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: truecharts
  values:
    persistence:
      config:
        enabled: true
        type: pvc
        retain: true
        accessModes: ReadWriteMany
        size: 10Gi
        storageClass: host-zfs-files
