---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radicale
  namespace: radicale
spec:
  interval: 5m
  chart:
    spec:
      chart: radicale
      version: 8.17.2
      sourceRef:
        kind: HelmRepository
        name: radicale
        namespace: radicale
  values:
    radicale:
      auth:
        htpasswd_encryption: bcrypt
        users:
          - username: andrei
            password: L*Y!trs^%4%hO4ytZh1r
    securityContext:
      pod:
        fsGroupChangePolicy: "Always"
    persistence:
      data:
        enabled: true
        type: pvc
        retain: true
        accessModes: ReadWriteMany
        size: 2Gi
        storageClass: host-zfs-files
