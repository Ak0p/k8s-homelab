---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sftpgo
  namespace: sftpgo
spec:
  interval: 5m
  chart:
    spec:
      chart: sftpgo
      version: 9.18.0
      sourceRef:
        kind: HelmRepository
        name: sftpgo
        namespace: sftpgo
  values:
    storageClass:
      host-zfs-files:
        enabled: true
        provisioner: zfs.csi.openebs.io
