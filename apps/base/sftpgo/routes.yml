---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: sftpgo-sftp-route
  namespace: traefik
spec:
  entryPoints:
    - sftp
  routes:
    - match: HostSNI(`*`)
      services:
        - name: sftpgo-sftpport
          port: 2022
          namespace: sftpgo
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: sftpgo-ftp-route
  namespace: traefik
spec:
  entryPoints:
    - ftp
  routes:
    - match: HostSNI(`*`)
      services:
        - name: sftpgo-ftpport
          port: 2121
          namespace: sftpgo
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sftpgo-webdav-route
  namespace: traefik
spec:
  routes:
    - kind: Rule
      match: Host(`calendar.akop.ro`)
      services:
        - kind: Service
          name: sftpgo-webdavport
          namespace: sftpgo
          port: 10080
